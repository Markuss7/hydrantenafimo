<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hydranten Nürnberg – Karte</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161a22; --border: #252c3a;
      --red: #ff3c3c; --yellow: #ffd166; --blue: #4ea8de;
      --green: #56cfb2; --text: #e8ecf4; --muted: #8492a6;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
    #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

    /* darken OSM tiles for dark theme */
    .leaflet-tile-pane { filter: brightness(0.78) saturate(0.8); }
    .leaflet-control-zoom { border: 1px solid var(--border) !important; }
    .leaflet-control-zoom a {
      background: rgba(13,15,20,0.95) !important; color: var(--text) !important;
      border-color: var(--border) !important; font-family: 'DM Mono', monospace;
    }
    .leaflet-control-zoom a:hover { background: #1e2535 !important; color: var(--blue) !important; }
    .leaflet-control-attribution {
      background: rgba(13,15,20,0.7) !important; color: var(--muted) !important;
      font-size: 9px !important; font-family: 'DM Mono', monospace;
    }
    .leaflet-control-attribution a { color: var(--blue) !important; }

    /* Topbar */
    #topbar {
      position: absolute; top: 0; left: 0; right: 0; height: 52px;
      background: rgba(13,15,20,0.96);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px; padding: 0 16px;
      z-index: 1000; backdrop-filter: blur(8px);
    }
    #topbar h1 {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px;
      letter-spacing: 0.07em; color: var(--text); text-transform: uppercase; white-space: nowrap;
    }
    #topbar h1 span { color: var(--red); }
    .sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
    .chip {
      font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .chip strong { color: var(--text); font-weight: 500; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* Panels */
    .panel {
      position: absolute; background: rgba(13,15,20,0.93);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 13px 15px; z-index: 1000; backdrop-filter: blur(12px);
    }
    .panel h3 {
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }

    #legend { bottom: 24px; left: 12px; min-width: 190px; }
    .leg-row {
      display: flex; align-items: center; gap: 9px; margin-bottom: 7px;
      font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text);
    }
    .leg-dot {
      width: 11px; height: 11px; border-radius: 50%; border: 2px solid; flex-shrink: 0;
    }
    .leg-count { margin-left: auto; color: var(--muted); font-size: 10px; }

    #gps-panel { bottom: 24px; right: 12px; min-width: 215px; }
    .gps-status {
      display: flex; align-items: center; gap: 8px; margin-bottom: 9px;
    }
    #gps-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background .3s; }
    #gps-dot.active { background: var(--green); box-shadow: 0 0 7px var(--green); animation: blink 1.8s ease-in-out infinite; }
    #gps-dot.error  { background: var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    #gps-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .gps-row {
      font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
      display: flex; justify-content: space-between; gap: 10px; margin-bottom: 4px;
    }
    .gps-row span { color: var(--text); }
    #gps-btn {
      width: 100%; margin-top: 10px; padding: 7px 0;
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px;
      letter-spacing: .04em; cursor: pointer;
      transition: background .18s, border-color .18s, color .18s;
    }
    #gps-btn:hover:not(:disabled) { background: #1e2535; border-color: var(--blue); color: var(--blue); }
    #gps-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background: rgba(13,15,20,0.97) !important; border: 1px solid var(--border) !important;
      border-radius: 8px !important; box-shadow: 0 8px 28px rgba(0,0,0,.6) !important;
      padding: 0 !important;
    }
    .leaflet-popup-content {
      margin: 11px 14px !important; font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--text); line-height: 1.75; min-width: 150px;
    }
    .leaflet-popup-tip { background: var(--border) !important; }
    .leaflet-popup-close-button { color: var(--muted) !important; }
    .pt { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; margin-bottom: 2px; }
    .pm { color: var(--muted); }
  </style>
</head>

  if (bauart.includes('UH'))  return { color: '#4ea8de', key: 'uh' };
  if (bauart.includes('OH'))  return { color: '#ff3c3c', key: 'oh' };
  if (bauart.includes('TWB')) return { color: '#ffd166', key: 'twb' };
  return                             { color: '#56cfb2', key: 'gh' };
}

// ── Leaflet map ──────────────────────────────────────────────────────────
const map = L.map('map', { center: [49.410, 11.179], zoom: 14 });

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

// ── Render markers ───────────────────────────────────────────────────────
const counts = { uh: 0, oh: 0, gh: 0, twb: 0 };

DATA.forEach(h => {
  const c = cfg(h.bauart);
  counts[c.key]++;
  L.circleMarker([h.lat, h.lon], {
    radius: 5, color: c.color, fillColor: c.color,
    fillOpacity: 0.9, weight: 1.5
  }).addTo(map).bindPopup(
    `<div class="pt" style="color:${c.color}">${h.bauart}</div>` +
    `<div>${h.strasse}${h.hausnr ? ' ' + h.hausnr : ''}</div>` +
    `<div class="pm">${h.ort}</div>`
  );
});

['uh','oh','gh','twb'].forEach(k => {
  document.getElementById('c-' + k).textContent = counts[k];
  document.getElementById('l-' + k).textContent = counts[k];
});

// ── GPS ──────────────────────────────────────────────────────────────────
let gpsMark = null, gpsCirc = null, gpsLL = null;

function onGPS(pos) {
  const { latitude: lat, longitude: lon, accuracy: acc } = pos.coords;
  const ll = [lat, lon];
  if (!gpsMark) {
    gpsMark = L.circleMarker(ll, {
      radius: 9, color: '#fff', fillColor: '#56cfb2', fillOpacity: 1, weight: 2.5
    }).addTo(map).bindPopup('<div class="pt" style="color:#56cfb2">Mein Standort</div>');
    gpsCirc = L.circle(ll, {
      radius: acc, color: '#56cfb2', fillColor: '#56cfb2', fillOpacity: 0.1, weight: 1
    }).addTo(map);
  } else {
    gpsMark.setLatLng(ll);
    gpsCirc.setLatLng(ll).setRadius(acc);
  }
  gpsLL = ll;
  document.getElementById('gps-dot').className = 'active';
  document.getElementById('gps-label').textContent = 'Standort aktiv';
  document.getElementById('g-lat').textContent = lat.toFixed(6);
  document.getElementById('g-lon').textContent = lon.toFixed(6);
  document.getElementById('g-acc').textContent = '±' + Math.round(acc) + ' m';
  document.getElementById('gps-btn').disabled = false;
}

function onGPSErr(e) {
  document.getElementById('gps-dot').className = 'error';
  document.getElementById('gps-label').textContent = 'GPS nicht verfügbar';
  document.getElementById('g-acc').textContent = e.message;
}

function centerGPS() { if (gpsLL) map.setView(gpsLL, 16, { animate: true }); }
window.centerGPS = centerGPS;

if ('geolocation' in navigator) {
  navigator.geolocation.watchPosition(onGPS, onGPSErr, {
    enableHighAccuracy: true, maximumAge: 5000, timeout: 15000
  });
} else {
  document.getElementById('gps-dot').className = 'error';
  document.getElementById('gps-label').textContent = 'Kein GPS-Support';
}
</script>
</body>
</html>
